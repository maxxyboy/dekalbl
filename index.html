<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Arrivals</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { height: 100vh; }

        body {
            background: #000;
            color: #fff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none;
            overflow: hidden;
        }

        #topbar {
            padding: 18px 32px 14px;
            border-bottom: 2px solid #222;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        #topbar-title { font-size: 15px; color: #555; text-transform: uppercase; letter-spacing: 3px; }
        #clock { font-size: 28px; font-weight: 300; color: #ccc; letter-spacing: 1px; }

        #panels { flex: 1; display: flex; overflow: hidden; }

        #left {
            flex: 1;
            border-right: 2px solid #222;
            display: flex;
            flex-direction: column;
        }
        #left-header {
            padding: 20px 28px 14px;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .bullet {
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }
        .bullet-sm { width: 44px; height: 44px; font-size: 24px; }
        .bullet-md { width: 64px; height: 64px; font-size: 36px; }
        .bullet-lg { width: 80px; height: 80px; font-size: 44px; }
        .bullet-l  { background: #6d6d6d; }
        .bullet-m  { background: #ff6319; }

        .station-info { flex: 1; }
        .station-name { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; line-height: 1; }
        .direction { font-size: 13px; color: #aaa; margin-top: 4px; text-transform: uppercase; letter-spacing: 1.5px; }

        #left-next {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 28px;
        }
        #next-label { font-size: 13px; color: #555; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; }
        #next-row { display: flex; align-items: center; gap: 24px; width: 100%; }
        #next-destination { font-size: 38px; font-weight: 400; flex: 1; }
        #next-time { font-size: 96px; font-weight: 700; letter-spacing: -4px; line-height: 1; text-align: right; }
        #next-time .unit { font-size: 28px; font-weight: 400; color: #aaa; margin-left: 6px; }
        #next-time.brd { color: #00933c; font-size: 64px; }
        #next-time.arr { color: #fccc0a; font-size: 64px; }

        #upcoming-list { border-top: 1px solid #222; padding: 0 28px 16px; }
        #upcoming-list-label { font-size: 11px; color: #444; text-transform: uppercase; letter-spacing: 2px; padding: 12px 0 8px; }
        .upcoming-row { display: flex; align-items: center; gap: 16px; padding: 8px 0; border-top: 1px solid #1a1a1a; }
        .upcoming-dest { font-size: 18px; font-weight: 400; flex: 1; color: #ccc; }
        .upcoming-time { font-size: 22px; font-weight: 600; color: #888; }
        .upcoming-time .unit { font-size: 14px; font-weight: 400; color: #555; margin-left: 4px; }
        .upcoming-time.brd { color: #00933c; }
        .upcoming-time.arr { color: #fccc0a; }
        .empty-msg { color: #444; font-size: 16px; padding: 12px 0; }

        #right { flex: 1; display: flex; flex-direction: column; }
        #right-header {
            padding: 20px 28px 14px;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        #right-arrivals {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 28px;
        }
        #m-next-label { font-size: 13px; color: #555; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; }
        #m-next-row { display: flex; align-items: center; gap: 24px; margin-bottom: 24px; }
        #m-next-destination { font-size: 38px; font-weight: 400; flex: 1; }
        #m-next-time { font-size: 96px; font-weight: 700; letter-spacing: -4px; line-height: 1; text-align: right; }
        #m-next-time .unit { font-size: 28px; font-weight: 400; color: #aaa; margin-left: 6px; }
        #m-next-time.brd { color: #00933c; font-size: 64px; }
        #m-next-time.arr { color: #fccc0a; font-size: 64px; }

        #m-upcoming { border-top: 1px solid #222; padding-top: 12px; }
        #m-upcoming-label { font-size: 11px; color: #444; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        .m-row { display: flex; align-items: center; gap: 16px; padding: 8px 0; border-top: 1px solid #1a1a1a; }
        .m-dest { font-size: 18px; color: #ccc; flex: 1; }
        .m-time { font-size: 22px; font-weight: 600; color: #888; }
        .m-time .unit { font-size: 14px; color: #555; margin-left: 4px; }
        .m-time.brd { color: #00933c; }
        .m-time.arr { color: #fccc0a; }

        /* ── NEWS TICKER ── */
        #news-ticker {
            border-top: 1px solid #222;
            margin-top: auto;
            flex-shrink: 0;
            height: 100px;
            display: flex;
            align-items: center;
            overflow: hidden;
        }
        #news-track-wrap {
            flex: 1;
            overflow: hidden;
            height: 100%;
            display: flex;
            align-items: center;
            position: relative;
        }
        #news-track {
            display: inline-flex;
            white-space: nowrap;
            position: absolute;
        }
        .news-item {
            font-size: 26px;
            font-weight: 600;
            color: #ddd;
            padding-right: 100px;
            white-space: nowrap;
        }
        .news-item::before {
            content: '\25C6';
            color: #555;
            margin-right: 16px;
            font-size: 12px;
        }

        /* ── FOOTER ── */
        #footer {
            padding: 10px 32px;
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #444;
            font-size: 12px;
        }
        #dot { width: 7px; height: 7px; border-radius: 50%; background: #555; display: inline-block; margin-right: 5px; transition: background 0.3s; }
        #dot.live  { background: #00933c; }
        #dot.error { background: #c60c30; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
        #dot.loading { animation: pulse 1s infinite; background: #fccc0a; }

        #delay-banner { display: none; background: #c60c30; color: #fff; font-size: 12px; font-weight: 600; text-align: center; padding: 5px 32px; letter-spacing: 0.5px; }
        #delay-banner.visible { display: block; }
    </style>
</head>

<body>

    <div id="topbar">
        <div id="topbar-title">Live Train Arrivals</div>
        <div id="clock">--:--</div>
    </div>

    <div id="delay-banner"></div>

    <div id="panels">

        <!-- LEFT: L train at DeKalb Av -->
        <div id="left">
            <div id="left-header">
                <div class="bullet bullet-md bullet-l">L</div>
                <div class="station-info">
                    <div class="station-name">DeKalb Av</div>
                    <div class="direction">Toward 8 Av — Manhattan</div>
                </div>
            </div>
            <div id="left-next">
                <div id="next-label">Next train</div>
                <div id="next-row">
                    <div class="bullet bullet-lg bullet-l" id="next-bullet">L</div>
                    <div id="next-destination">—</div>
                    <div id="next-time"><span style="color:#444;font-size:20px">Loading</span></div>
                </div>
            </div>
            <div id="upcoming-list">
                <div id="upcoming-list-label">Following trains</div>
                <div id="upcoming-rows"><div class="empty-msg">—</div></div>
            </div>
        </div>

        <!-- RIGHT: M train at Knickerbocker Av -->
        <div id="right">
            <div id="right-header">
                <div class="bullet bullet-md bullet-m">M</div>
                <div class="station-info">
                    <div class="station-name">Knickerbocker Av</div>
                    <div class="direction">Toward Middle Village</div>
                </div>
            </div>
            <div id="right-arrivals">
                <div id="m-next-label">Next train</div>
                <div id="m-next-row">
                    <div class="bullet bullet-md bullet-m" id="m-next-bullet">M</div>
                    <div id="m-next-destination">—</div>
                    <div id="m-next-time"><span style="color:#444;font-size:16px">Loading</span></div>
                </div>
                <div id="m-upcoming">
                    <div id="m-upcoming-label">Following trains</div>
                    <div id="m-upcoming-rows"><div class="empty-msg">—</div></div>
                </div>

                <div id="news-ticker">
                    <div id="news-track-wrap">
                        <div id="news-track"><span class="news-item" style="color:#333">Loading headlines...</span></div>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <div id="footer">
        <div><span id="dot" class="loading"></span><span id="status">Connecting...</span></div>
        <div id="updated">—</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/protobufjs@7/dist/protobuf.min.js"></script>
    <script>
        /* ── CONFIG ── */
        const L_STOP = 'L16S';
        const M_STOP = 'M09N';
        const L_FEED = 'https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/nyct%2Fgtfs-l';
        const M_FEED = 'https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/nyct%2Fgtfs-bdfm';
        const REFRESH = 30000;
        const NEWS_REFRESH = 10 * 60 * 1000;

        const PROTO = [
            'syntax = "proto2";',
            'message FeedMessage { required FeedHeader header = 1; repeated FeedEntity entity = 2; }',
            'message FeedHeader { required string gtfs_realtime_version = 1; optional uint32 incrementality = 2; optional uint64 timestamp = 3; }',
            'message FeedEntity { required string id = 1; optional bool is_deleted = 2; optional TripUpdate trip_update = 3; optional VehiclePosition vehicle = 4; optional Alert alert = 5; }',
            'message TripUpdate { required TripDescriptor trip = 1; optional VehicleDescriptor vehicle = 3; repeated StopTimeUpdate stop_time_update = 2; optional uint64 timestamp = 4; optional int32 delay = 5; }',
            'message TripDescriptor { optional string trip_id = 1; optional string start_time = 2; optional string start_date = 3; optional int32 schedule_relationship = 4; optional string route_id = 5; optional uint32 direction_id = 6; }',
            'message StopTimeUpdate { optional uint32 stop_sequence = 1; optional StopTimeEvent arrival = 2; optional StopTimeEvent departure = 3; optional string stop_id = 4; optional int32 schedule_relationship = 5; }',
            'message StopTimeEvent { optional int32 delay = 1; optional int64 time = 2; optional int32 uncertainty = 3; }',
            'message VehiclePosition { optional TripDescriptor trip = 1; optional VehicleDescriptor vehicle = 8; }',
            'message VehicleDescriptor { optional string id = 1; optional string label = 2; optional string license_plate = 3; }',
            'message Alert { optional string header_text = 5; }'
        ].join('\n');

        function toNum(val) {
            if (val === null || val === undefined) return null;
            if (typeof val === 'object' && typeof val.toNumber === 'function') return val.toNumber();
            return Number(val);
        }

        let FeedMessage = null;
        async function initProto() {
            const root = protobuf.parse(PROTO).root;
            FeedMessage = root.lookupType('FeedMessage');
        }

        function setDot(cls, text) {
            document.getElementById('dot').className = cls;
            document.getElementById('status').textContent = text;
        }

        function updateClock() {
            const n = new Date();
            document.getElementById('clock').textContent =
                String(n.getHours()).padStart(2, '0') + ':' + String(n.getMinutes()).padStart(2, '0');
        }

        function timeHTML(a, large) {
            if (!a) return '<span style="color:#444;font-size:' + (large ? '20' : '14') + 'px">No trains</span>';
            if (a.status === 'BRD') return 'BRDG';
            if (a.status === 'ARR') return 'ARR';
            return a.minutes + '<span class="unit">min</span>';
        }

        function timeClass(a) {
            if (!a) return '';
            if (a.status === 'BRD') return 'brd';
            if (a.status === 'ARR') return 'arr';
            return '';
        }

        function arrivalStatus(delta) {
            if (delta < 30) return 'BRD';
            if (delta < 60) return 'ARR';
            return null;
        }

        function parseArrivals(buf, stopId, routeId) {
            const msg = FeedMessage.decode(new Uint8Array(buf));
            const now = Date.now() / 1000;
            const arrivals = [];
            let maxDelay = 0;

            for (const entity of (msg.entity || [])) {
                const tu = entity.tripUpdate;
                if (!tu) continue;
                if (tu.trip.routeId !== routeId) continue;

                const tripDelay = tu.delay ? Number(tu.delay) : 0;
                if (tripDelay > maxDelay) maxDelay = tripDelay;

                for (const stu of (tu.stopTimeUpdate || [])) {
                    if (stu.stopId !== stopId) continue;
                    let t = null;
                    if (stu.arrival && stu.arrival.time != null) t = toNum(stu.arrival.time);
                    else if (stu.departure && stu.departure.time != null) t = toNum(stu.departure.time);
                    if (t === null) continue;

                    const stopDelay = (stu.arrival && stu.arrival.delay != null) ? Number(stu.arrival.delay) : tripDelay;
                    const adjustedT = t + stopDelay;
                    const delta = adjustedT - now;
                    if (delta < -30) continue;

                    const minutes = Math.max(0, Math.floor(delta / 60));
                    const status = arrivalStatus(delta) || (minutes + ' min');
                    arrivals.push({ minutes, status, destination: routeId === 'L' ? '8 Av' : 'Middle Village', arrivalTime: adjustedT });
                    break;
                }
            }

            arrivals.sort((a, b) => a.arrivalTime - b.arrivalTime);
            return { arrivals, maxDelay };
        }

        function renderL(arrivals, maxDelay) {
            const banner = document.getElementById('delay-banner');
            if (maxDelay >= 120) {
                banner.textContent = '⚠ Delays of approx. ' + Math.round(maxDelay / 60) + ' min on the L train';
                banner.classList.add('visible');
            } else {
                banner.classList.remove('visible');
            }

            const next = arrivals[0] || null;
            document.getElementById('next-destination').textContent = next ? next.destination : '—';
            const timeEl = document.getElementById('next-time');
            timeEl.className = timeClass(next);
            timeEl.innerHTML = timeHTML(next, true);

            const rows = arrivals.slice(1, 4);
            const container = document.getElementById('upcoming-rows');
            if (!rows.length) {
                container.innerHTML = '<div class="empty-msg">No further trains</div>';
            } else {
                container.innerHTML = rows.map(a => `
                    <div class="upcoming-row">
                        <div class="bullet bullet-sm bullet-l" style="width:28px;height:28px;font-size:15px">L</div>
                        <div class="upcoming-dest">${a.destination}</div>
                        <div class="upcoming-time ${timeClass(a)}">${timeHTML(a, false)}</div>
                    </div>`).join('');
            }
        }

        function renderM(arrivals) {
            const next = arrivals[0] || null;
            document.getElementById('m-next-destination').textContent = next ? next.destination : '—';
            const timeEl = document.getElementById('m-next-time');
            timeEl.className = timeClass(next);
            timeEl.innerHTML = timeHTML(next, false);

            const rows = arrivals.slice(1, 4);
            const container = document.getElementById('m-upcoming-rows');
            if (!rows.length) {
                container.innerHTML = '<div class="empty-msg">No further trains</div>';
            } else {
                container.innerHTML = rows.map(a => `
                    <div class="m-row">
                        <div class="bullet bullet-sm bullet-m" style="width:24px;height:24px;font-size:13px">M</div>
                        <div class="m-dest">${a.destination}</div>
                        <div class="m-time ${timeClass(a)}">${timeHTML(a, false)}</div>
                    </div>`).join('');
            }
        }

        async function fetchFeed(url, stopId, routeId) {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const buf = await resp.arrayBuffer();
            return parseArrivals(buf, stopId, routeId);
        }

        async function fetchAll() {
            if (!FeedMessage) return;
            setDot('loading', 'Updating...');

            const [lResult, mResult] = await Promise.allSettled([
                fetchFeed(L_FEED, L_STOP, 'L'),
                fetchFeed(M_FEED, M_STOP, 'M')
            ]);

            let anyError = false;
            if (lResult.status === 'fulfilled') {
                renderL(lResult.value.arrivals, lResult.value.maxDelay);
            } else {
                console.error('L feed:', lResult.reason);
                anyError = true;
            }
            if (mResult.status === 'fulfilled') {
                renderM(mResult.value.arrivals);
            } else {
                console.error('M feed:', mResult.reason);
                anyError = true;
            }

            const n = new Date();
            document.getElementById('updated').textContent = 'Updated ' +
                String(n.getHours()).padStart(2,'0') + ':' +
                String(n.getMinutes()).padStart(2,'0') + ':' +
                String(n.getSeconds()).padStart(2,'0');
            setDot(anyError ? 'error' : 'live', anyError ? 'Partial error — check console' : 'Live MTA feed');
        }

        /* ── NEWS TICKER ── */
        let tickerAnim = null;

        function startTicker(headlines) {
            const track = document.getElementById('news-track');
            if (tickerAnim) { tickerAnim.cancel(); tickerAnim = null; }
            const make = () => headlines.map(h => `<span class="news-item">${h}</span>`).join('');
            track.innerHTML = make() + make(); // doubled for seamless loop
            requestAnimationFrame(() => {
                const half = track.scrollWidth / 2;
                tickerAnim = track.animate(
                    [{ transform: 'translateX(0)' }, { transform: `translateX(-${half}px)` }],
                    { duration: half * 15, iterations: Infinity, easing: 'linear' }
                );
            });
        }

        async function fetchNews() {
            try {
                // Calls your Netlify function at /.netlify/functions/news
                // No CORS issue — same domain as your site
                const resp = await fetch('/.netlify/functions/news');
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const data = await resp.json();
                if (data.headlines?.length) startTicker(data.headlines);
                else throw new Error('No headlines returned');
            } catch (e) {
                console.error('News error:', e);
                startTicker(['Unable to load headlines — retrying in 10 min']);
            }
        }

        updateClock();
        setInterval(updateClock, 1000);
        initProto().then(() => { fetchAll(); setInterval(fetchAll, REFRESH); });
        setTimeout(() => { fetchNews(); setInterval(fetchNews, NEWS_REFRESH); }, 1500);

        document.addEventListener('click', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        });
    </script>
</body>
</html>
